server {
    listen 80;
    server_name videh.co.in www.videh.co.in;
    client_max_body_size 160M;

    root /var/www/videh-site;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name admin.videh.co.in;
    client_max_body_size 160M;

    location / {
        root /var/www/videh/artifacts/admin-web/dist/public;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name web.videh.co.in;
    client_max_body_size 160M;

    location / {
        root /var/www/videh/artifacts/videh-web/dist/public;
        try_files $uri $uri/ /index.html;
