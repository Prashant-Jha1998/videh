name: Build iOS (App Store)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Signed IPA (EAS local, macOS)
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.13.0

      - name: Verify Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Build signed iOS archive
        working-directory: artifacts/videh
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_DOMAIN: videh.co.in
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
          EAS_SKIP_AUTO_FINGERPRINT: "1"
        run: |
          mkdir -p build
          VERSION=$(node -p "require('./app.json').expo.version")
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            --output "./build/videh-${VERSION}-ios.tar.gz"

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: videh-ios-run${{ github.run_number }}
          path: artifacts/videh/build/*
          if-no-files-found: error
