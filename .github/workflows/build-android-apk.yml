name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS profile (preview = test APK, apkRelease = release-signed APK)"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - apkRelease

jobs:
  build-apk:
    name: Signed APK (EAS local, no cloud quota)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.13.0

      - name: Verify Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Build signed APK
        working-directory: artifacts/videh
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_DOMAIN: videh.co.in
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
          EAS_SKIP_AUTO_FINGERPRINT: "1"
        run: |
          mkdir -p build
          VERSION=$(node -p "require('./app.json').expo.version")
          CODE=$(node -p "require('./app.json').expo.android.versionCode")
          OUT="./build/videh-${VERSION}-b${CODE}-${{ inputs.profile }}.apk"
          eas build \
            --platform android \
            --profile "${{ inputs.profile }}" \
            --local \
            --non-interactive \
            --output "$OUT"
          echo "APK_PATH=$OUT" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: videh-apk-${{ inputs.profile }}-run${{ github.run_number }}
          path: artifacts/videh/build/*.apk
          if-no-files-found: error
