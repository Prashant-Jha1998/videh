name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: apkRelease (EAS cloud)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.13.0

      - name: Verify Expo account
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Build APK (prashantjha122/videh)
        working-directory: artifacts/videh
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_DOMAIN: videh.co.in
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: |
          eas build \
            --platform android \
            --profile apkRelease \
            --non-interactive \
            --wait
