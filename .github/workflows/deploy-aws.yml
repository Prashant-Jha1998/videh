name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aws-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy EC2
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || (echo "::error::Missing GitHub secret EC2_HOST" && exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "::error::Missing GitHub secret EC2_USER" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "::error::Missing GitHub secret EC2_SSH_KEY" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/videh_ec2_key
          chmod 600 ~/.ssh/videh_ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/videh_ec2_key \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=30 \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
          set -euo pipefail

          cd /var/www/videh
          git fetch origin main
          git reset --hard origin/main

          export PATH="/usr/local/bin:/usr/bin:/bin:$HOME/.local/share/pnpm:$PATH"
          command -v pnpm >/dev/null || (echo "pnpm not found on EC2 — install pnpm on the server" && exit 1)

          if ! pnpm install --frozen-lockfile; then
            echo "::error::pnpm-lock.yaml is out of sync with package.json. Run 'pnpm install' at repo root, commit pnpm-lock.yaml, and push again."
            exit 1
          fi
          pnpm --filter @workspace/api-server run build:api
          BASE_PATH=/ pnpm --filter @workspace/admin-web build
          BASE_PATH=/ pnpm --filter @workspace/videh-web build
          BASE_PATH=/ pnpm --filter @workspace/developer-web build

          pm2 restart videh-api --update-env || (
            cd /var/www/videh/artifacts/api-server
            pm2 start dist/index.mjs --name videh-api --interpreter node --node-args="--env-file=/var/www/videh/artifacts/api-server/.env --enable-source-maps"
          )
          pm2 save

          sudo bash /var/www/videh/deploy/nginx/apply-videh-site.sh

          sleep 15

          for attempt in 1 2 3 4 5 6 7 8; do
            SITE_OK=false
            API_OK=false
            if curl --fail --silent --show-error https://videh.co.in/ | grep -q "Videh" \
              && curl --fail --silent --show-error https://videh.co.in/sitemap.xml | grep -q "<urlset"; then
              SITE_OK=true
            fi
            if curl --fail --silent --show-error https://videh.co.in/api/readyz; then
              API_OK=true
            fi
            if [ "${SITE_OK}" = true ] && [ "${API_OK}" = true ]; then
              echo "Deploy health checks passed."
              exit 0
            fi
            if [ "${SITE_OK}" = true ] && [ "${attempt}" -ge 6 ]; then
              echo "::warning::Public site OK but API readyz still failing — deploy continues."
              exit 0
            fi
            echo "Health check failed on attempt ${attempt} (site=${SITE_OK} api=${API_OK}); retrying..."
            sleep 6
          done

          echo "::group::PM2 logs"
          pm2 logs videh-api --lines 80 --nostream || true
          echo "::endgroup::"
          exit 1
          EOF
